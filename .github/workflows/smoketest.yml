name: Dashboard publish (manual; mirrors dashboard.yml)

# The scheduled publisher is dashboard.yml. This manually-dispatchable workflow runs the SAME
# live publish + commit, used to fire the first publish while GitHub finished registering the
# new dashboard.yml. Same guarantees: fixed seed, fail-loud keeps last-good.

on:
  workflow_dispatch:
    inputs:
      as_of:
        description: "Point-in-time (ISO, or 'now')"
        default: "now"
        required: true
      espn_start:
        description: "ESPN window start"
        default: "2026-06-11"
        required: true

permissions:
  contents: write

concurrency:
  group: dashboard
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --quiet -e .
      - name: Tests (gate)
        run: |
          python -m pip install --quiet pytest
          pytest -q
      - name: Build + publish odds (live, fixed seed; fail-loud keeps last-good)
        run: |
          python -m wcpredictor.report.run --live --as-of "${{ github.event.inputs.as_of }}" \
            --n 50000 --seed 2026 \
            --espn-start "${{ github.event.inputs.espn_start }}" --espn-end "$(date -u +%F)"
      - name: Show published odds (for the run log)
        run: |
          python - <<'PY'
          import json
          d=json.load(open("docs/data/latest.json")); m=d["meta"]
          print(f"generated_at={m['generated_at']}  as_of={m['as_of']}  n_played={m['n_played']} "
                f"n_sims={m['n_sims']} seed={m['seed']} results={m['source']['results']}")
          print("matches reflected:")
          for x in m["matches_reflected"]:
              print(f"  {x['date']} [{x['group']}] {x['home']} {x['hg']}-{x['ag']} {x['away']}")
          print("top 15 title odds (team  title%  delta_pp  adv%):")
          for i,r in enumerate(d["title_odds"][:15],1):
              print(f"  {i:2}. {r['team']:<22} {r['title']*100:5.1f}  {r['title_delta']*100:+5.2f}  "
                    f"{r['reach']['R32']*100:5.1f}  [{r['status']}]")
          PY
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "no change to publish."
          else
            git commit -m "dashboard: first live publish [skip ci]"
            git push
          fi
