name: API-Football smoke test (WC-2026 coverage)

# Verification gate for plan.md §12.1 (D1). Proves — on Actions, where there is open
# internet and the API_FOOTBALL_KEY secret — that API-Football's free tier actually covers
# the 2026 World Cup with the data this project needs. NOT Phase 1 engine code: it only
# prints findings to the run log. Manual trigger only.
#
# NOTE: workflow_dispatch only registers from the DEFAULT branch, so this file must be on
# the default branch (main) before the "Run workflow" button/API is available.

on:
  workflow_dispatch:
    inputs:
      league_id:
        description: "API-Football league id for the FIFA World Cup (default 1)"
        default: "1"
        required: true
      season:
        description: "Season year (default 2026)"
        default: "2026"
        required: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      BASE: https://v3.football.api-sports.io
      LEAGUE: ${{ github.event.inputs.league_id }}
      SEASON: ${{ github.event.inputs.season }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
    steps:
      - name: Fail loudly if the secret is missing
        run: |
          if [ -z "${API_FOOTBALL_KEY:-}" ]; then
            echo "::error::API_FOOTBALL_KEY secret is not set for this repo. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "Key present (value masked by Actions). BASE=$BASE LEAGUE=$LEAGUE SEASON=$SEASON"

      - name: Smoke test — does the free tier cover WC-2026 with the fields we need?
        run: |
          # errexit OFF on purpose: this is a diagnostic; we want every probe to run and
          # print, then decide pass/fail at the end. (GitHub's default shell is `bash -e`.)
          set +e +o pipefail
          api () { curl -s -H "x-apisports-key: $API_FOOTBALL_KEY" "$BASE$1"; }

          echo "=================================================="
          echo "(0) Account / quota"
          api "/status" | jq '{plan: .response.subscription.plan, active: .response.subscription.active, requests: .response.requests}'

          echo "=================================================="
          echo "(1) Discover: which 'World Cup' leagues + seasons can THIS key actually see?"
          api "/leagues?search=World%20Cup" > L.json
          echo "api .errors (expect [] or {}):"; jq -c '.errors' L.json
          echo "results:"; jq '.results' L.json
          echo "candidates (id | name [type] | country | seasons visible to this key):"
          jq -r '.response[]? | "  id=\(.league.id) | \(.league.name) [\(.league.type)] | \(.country.name // "World") | seasons=\([.seasons[].year]|join(",") )"' L.json

          # Pick the men's World Cup league that exposes the requested season to this key.
          WCID=$(jq -r --argjson yr "$SEASON" '[.response[]? | select(.league.name=="World Cup") | select(any(.seasons[].year; .==$yr)) | .league.id] | first // empty' L.json)
          echo "--> World Cup league id exposing season $SEASON to this key: ${WCID:-<NONE>}"

          if [ -z "$WCID" ]; then
            echo "::error::This API-Football key/plan does NOT expose a 'World Cup' league with a $SEASON season (see candidates above). Coverage gate NOT passed — STOP before Phase 1."
            echo "Also showing what id=$LEAGUE returns directly, for completeness:"
            api "/leagues?id=$LEAGUE&season=$SEASON" | jq '{results, errors}'
            exit 1
          fi
          LEAGUE="$WCID"
          echo "Using LEAGUE=$LEAGUE SEASON=$SEASON for the remaining probes."
          api "/leagues?id=$LEAGUE&season=$SEASON" | jq -r '.response[0].seasons[]? | select(.year=='"$SEASON"') | "season coverage: fixtures.events=\(.coverage.fixtures.events) standings=\(.coverage.standings) statistics=\(.coverage.fixtures.statistics_fixtures)"'

          echo "=================================================="
          echo "(2) Standings — expect 12 groups x 4 teams"
          S=$(api "/standings?league=$LEAGUE&season=$SEASON")
          echo "api .errors:"; echo "$S" | jq -c '.errors'
          groups=$(echo "$S" | jq '(.response[0].league.standings | length) // 0')
          echo "groups found: $groups  (expect 12)"
          echo "group sizes (expect '4' x12):"
          echo "$S" | jq -r '.response[0].league.standings[]? | "  size \(length)"' | sort | uniq -c
          echo "--- first group's live table (real banked state) ---"
          echo "$S" | jq -r '.response[0].league.standings[0]?[]? | "  \(.rank). \(.team.name)  played=\(.all.played) pts=\(.points) GF=\(.all.goals.for) GA=\(.all.goals.against) GD=\(.goalsDiff)"'

          echo "=================================================="
          echo "(3) Fixtures — sample with kickoff + status"
          F=$(api "/fixtures?league=$LEAGUE&season=$SEASON")
          echo "api .errors:"; echo "$F" | jq -c '.errors'
          total=$(echo "$F" | jq '.response | length')
          echo "total fixtures returned: $total  (expect 104 for the full WC)"
          echo "$F" | jq -r '.response[:6][]? | "  \(.fixture.date)  [\(.fixture.status.short)]  \(.teams.home.name) vs \(.teams.away.name)"'

          echo "=================================================="
          echo "(5) Already-played group results WITH real scorelines"
          ft=$(echo "$F" | jq '[.response[]? | select(.fixture.status.short=="FT")] | length')
          echo "finished (FT) matches so far: $ft"
          echo "$F" | jq -r '[.response[]? | select(.fixture.status.short=="FT")][:20][]? | "  \(.fixture.date[:10])  \(.teams.home.name) \(.goals.home)-\(.goals.away) \(.teams.away.name)"'

          echo "=================================================="
          echo "(4) Card events for one finished match"
          fid=$(echo "$F" | jq -r 'first(.response[]? | select(.fixture.status.short=="FT") | .fixture.id) // empty')
          if [ -n "$fid" ]; then
            echo "using fixture id=$fid"
            api "/fixtures/events?fixture=$fid" | jq -r '([.response[]? | select(.type=="Card")] | length) as $c | "  card events: \($c)", (.response[]? | select(.type=="Card") | "  \(.time.elapsed)min  \(.team.name)  \(.player.name)  [\(.detail)]")'
          else
            echo "  No finished match yet — cannot show card events (not a coverage failure if the group stage has not kicked off)."
          fi

          echo "=================================================="
          echo "Smoke test complete. Review (0)-(5) above to confirm real WC-2026 coverage,"
          echo "including discipline (cards) and real played scorelines, before Phase 1."
