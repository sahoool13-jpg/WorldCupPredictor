name: WC-2026 data layer (live fetch on Actions)

# Runs the real Phase-1 data layer on Actions (open internet; the sandbox egress blocks
# ESPN). Proves the two-source pipeline end-to-end: openfootball static structure (12x4,
# 104 fixtures) + ESPN live-results overlay, reconciled point-in-time — showing the
# already-played matches with real scores, incl. the Australia 2-0 Turkey result that
# openfootball was missing. Manual trigger. (plan.md §12.1 / §15)

on:
  workflow_dispatch:
    inputs:
      as_of:
        description: "Point-in-time instant (ISO, UTC)"
        default: "2026-06-15T00:00:00Z"
        required: true
      espn_start:
        description: "ESPN overlay window start (YYYY-MM-DD)"
        default: "2026-06-11"
        required: true
      espn_end:
        description: "ESPN overlay window end (YYYY-MM-DD)"
        default: "2026-06-15"
        required: true

permissions:
  contents: read

jobs:
  data-layer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (editable, stdlib-only deps) + pytest
        run: |
          python -m pip install --quiet pytest
          python -m pip install --quiet -e .
      - name: Unit tests (offline gate)
        run: pytest -q
      - name: Verify openfootball structure
        run: python -m wcpredictor.data.pipeline --verify
      - name: Live two-source fetch + reconcile (point-in-time)
        run: |
          python -m wcpredictor.data.pipeline \
            --as-of "${{ github.event.inputs.as_of }}" \
            --espn-start "${{ github.event.inputs.espn_start }}" \
            --espn-end "${{ github.event.inputs.espn_end }}"
      - name: Team strength ratings (prior + live played matches)
        run: |
          python -m wcpredictor.ratings.engine --top 20 \
            --as-of "${{ github.event.inputs.as_of }}" \
            --espn-start "${{ github.event.inputs.espn_start }}" \
            --espn-end "${{ github.event.inputs.espn_end }}"
      - name: Goal model — sample scoreline matrices (prior-only ratings)
        run: python -m wcpredictor.model.demo
      - name: Tournament Monte Carlo — live title odds
        run: |
          python -m wcpredictor.sim.engine --live --n 50000 --top 18 \
            --as-of "${{ github.event.inputs.as_of }}" \
            --espn-start "${{ github.event.inputs.espn_start }}" \
            --espn-end "${{ github.event.inputs.espn_end }}"
