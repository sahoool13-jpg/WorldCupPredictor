name: Dashboard — rebuild live title odds

# Reruns the full pipeline (Phase 1-4) live and commits docs/data/latest.json, which the
# static GitHub Pages dashboard reads (plan.md §20). FIXED seed -> unchanged inputs give
# byte-identical odds and exactly-zero deltas. FAIL-LOUD: if any step raises, the job fails
# and nothing is committed, so the last-good latest.json (and its "last updated" stamp) stays.

on:
  schedule:
    - cron: "0 */3 * * *"      # every 3 hours (D5)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --quiet -e .
      - name: Tests (gate)
        run: |
          python -m pip install --quiet pytest
          pytest -q
      - name: Build + publish odds (live, fixed seed; fail-loud keeps last-good)
        run: |
          python -m wcpredictor.report.run --live --as-of now --n 50000 --seed 2026 \
            --espn-start 2026-06-11 --espn-end "$(date -u +%F)"
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "no change to publish."
          else
            git commit -m "dashboard: refresh title odds [skip ci]"
            git push
          fi
